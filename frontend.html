<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVESTMENT LAB</title>
    <style>
        .hidden { display: none; }

    </style> 
</head>
<body>

    <div id="procesoSignIn">
        <h1>Welcome to InvestmentLab (Primera versión)</h1>

            <h2>Sign in</h2>
            <input id="username" placeholder="Username"required><br><br>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="validarSignIn()">Sign In</button>
    </div>
    

    
    <div id="postSignIn" class="hidden">
        <h2>1) Cotización de acciones</h2>
            <i>Ingresa el símbolo de la acción a cotizar<br><br></i>
            <input id="symbolStock" placeholder="Ej: AAPL" />
            <button id="obtenerPrecio">Obtener precio</button>
            <pre id="cotizacionResult"></pre>

        <h2>2) Comprar</h2>
        <input id="shares" type="number" placeholder="Cantidad" />
        <button id="botonComprar">Comprar</button>
        <pre id="buyResult"></pre>

        <h2>3)Estado (cash y posiciones)</h2>
        <button id="botonEstado">Actualizar estado</button>
        <pre id="stateResult"></pre>

    </div>

    <script src="script.js"></script>
    <script src="./connector.js"></script>      
</body>
</html>
