<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Portal Usuario</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif;">

    
    <div style="width:100%; height:60px; background-color:#f0f0f0; display:flex; align-items:center; justify-content:space-between; padding:0 20px; box-sizing:border-box;">
        
        
        <button>Sign Out</button>

        <div style="width:120px; height:40px; border:1px solid gray; text-align:center; line-height:40px;">
            LOGO
        </div>
    </div>

    
    <div style="height:calc(100vh - 60px); display:flex; flex-direction:column; align-items:center; justify-content:center;">

        
        <h1>Bienvenido a tu portal, user.name</h1>

        
        <div style="display:flex; gap:30px; margin-top:40px;">

            <div style="width:200px; height:150px; border:2px solid black; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                Crea tu portafolio
            </div>

            <div style="width:200px; height:150px; border:2px solid black; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                Revisa tu portafolio
            </div>

            <div style="width:200px; height:150px; border:2px solid black; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                Revisa stock
            </div>

        </div>

    </div>

</body>
</html>
